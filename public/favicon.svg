<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gold/Yellow gradients matching the design -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD000" />
      <stop offset="100%" stop-color="#FF9000" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE57F" />
      <stop offset="50%" stop-color="#FFC107" />
      <stop offset="100%" stop-color="#FF8F00" />
    </linearGradient>
  </defs>

  <!-- Dark circular background to replicate the exact image aesthetic -->
  <circle cx="256" cy="256" r="240" fill="#0F172A" />

  <!-- Outer Ring with Gradient and styled gaps -->
  <!-- Left to bottom-right arc -->
  <path d="M 256,70 A 186,186 0 1,0 357,398" fill="none" stroke="url(#ringGrad)" stroke-width="8" stroke-linecap="round" />
  
  <!-- Top-right disconnect arc segment -->
  <path d="M 380,180 A 186,186 0 0,0 290,75" fill="none" stroke="url(#ringGrad)" stroke-width="8" stroke-linecap="round" />
  
  <!-- Right small dash segment -->
  <path d="M 390,300 A 186,186 0 0,0 392,260" fill="none" stroke="url(#ringGrad)" stroke-width="8" stroke-linecap="round" />

  <!-- Lightning Bolt -->
  <path d="M 276.5,130 L 204.5,248.5 L 261,248.5 L 242.5,398.5 L 314.5,213.5 L 256,213.5 Z" fill="url(#boltGrad)" />
</svg>